<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Force the browser to revalidate index.html on every load. Vite
         hashes all referenced assets (index-XXXX.js / .css) so they
         remain cacheable forever — but the HTML must not be cached or
         it'll keep pointing at old hashes after a deploy. Especially
         relevant for iOS Safari and PWA "Add to Home Screen" installs,
         which are otherwise very aggressive about holding the shell. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <!-- Build timestamp injected by Vite (see vite.config.ts). On
         mobile, open Safari Web Inspector / Chrome remote DevTools and
         read this tag (or the boot log line) to confirm which build is
         actually running — useful for diagnosing cache issues. -->
    <meta name="build-time" content="%VITE_BUILD_TIME%" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#05060d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Brickstorm" />
    <meta name="format-detection" content="telephone=no" />
    <title>Brickstorm</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230a0a18'/><rect x='6' y='8' width='20' height='4' fill='%2300e0ff'/><rect x='6' y='14' width='20' height='4' fill='%23ff3ad9'/><rect x='6' y='20' width='20' height='4' fill='%23ffd23a'/></svg>" />
    <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='32' fill='%230a0a18'/><rect x='30' y='44' width='120' height='20' rx='4' fill='%2300e0ff'/><rect x='30' y='80' width='120' height='20' rx='4' fill='%23ff3ad9'/><rect x='30' y='116' width='120' height='20' rx='4' fill='%23ffd23a'/></svg>" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!-- Desktop-only side panel (left). Hidden on mobile via CSS.
         Populated at runtime by src/game/ui/SidePanels.ts. -->
    <aside id="panel-left" class="side-panel side-panel--left" aria-hidden="true"></aside>

    <div id="game"></div>

    <!-- Desktop-only side panel (right). -->
    <aside id="panel-right" class="side-panel side-panel--right" aria-hidden="true"></aside>

    <div id="rotate-prompt" aria-hidden="true">
      <div class="rotate-icon">⟳</div>
      <div class="rotate-msg">ROTATE TO PORTRAIT</div>
    </div>

    <!-- "New version available" banner — toggled by VersionPoller when
         /version.json reports a different hash than the running bundle.
         Hidden by default; shown after detection. -->
    <div id="update-banner" role="status" aria-live="polite" hidden>
      <span class="update-text">🎮 New version available</span>
      <button id="update-btn" type="button">Refresh</button>
      <button id="update-dismiss" type="button" aria-label="Dismiss">✕</button>
    </div>

    <noscript>This game requires JavaScript.</noscript>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
