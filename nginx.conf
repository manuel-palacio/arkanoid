server {
    listen 8080 default_server;
    listen [::]:8080 default_server;

    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Health check endpoint for Fly.io.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # version.json — must NEVER be cached. This is how long-lived tabs
    # (which never re-fetch the HTML shell) detect that a new deploy
    # has happened. VersionPoller compares its content to the hash
    # baked into the bundle and shows an "update available" banner.
    location = /version.json {
        access_log off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    # Long-cache hashed assets (Vite fingerprints these filenames).
    # Safe to cache forever — if the file changes, its hash changes too.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Audio files in /audio/ — long cache. Filename change requires a
    # commit so cache-busting via filename works for these too.
    location /audio/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HTML entry points — NEVER cache. Mobile browsers must always
    # revalidate so they pick up the new hashed asset filenames after
    # a deploy. Without this, iOS Safari and Chrome serve stale
    # index.html for hours/days, pointing at long-deleted asset hashes.
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        # Edge / CDN cache hints — Fly.io's edge respects these too.
        add_header Surrogate-Control "no-store";
        add_header CDN-Cache-Control "no-store";
        try_files $uri /index.html;
    }

    # Web manifest — short cache (1 hour) so PWA metadata updates
    # propagate within a reasonable window without every request
    # paying the round-trip.
    location ~* \.webmanifest$ {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # Compressed text resources.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # SPA fallback — deep links resolve to index.html. The HTML
    # no-cache rule above applies here too via the ~* \.html$ block.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
